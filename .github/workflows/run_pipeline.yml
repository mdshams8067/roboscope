name: Run RoboScope Pipeline

# TRIGGER: when does this workflow run?
# - schedule: GitHub runs it automatically on a cron schedule (UTC time)
#   "0 */6 * * *" means: at minute 0, every 6th hour, every day, every month
#   cron format: minute  hour  day-of-month  month  day-of-week
# - workflow_dispatch: adds a "Run workflow" button in the GitHub Actions UI
#   so you can trigger it manually anytime without waiting for the schedule
on:
  schedule:
    - cron: '0 0 * * *'   # daily at midnight UTC
  workflow_dispatch:

jobs:
  run:
    # GitHub provides free Ubuntu VMs (2,000 minutes/month on free tier)
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out your repo onto the VM
      # Without this the VM is just a blank Linux box with none of your code
      - uses: actions/checkout@v4
        with:
          # Needed so the VM can push the updated feed.json back to the repo
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Install Python 3.11
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # Cache pip packages between runs — speeds up subsequent runs significantly
          cache: 'pip'

      # Step 3: Install Python dependencies from requirements.txt
      - run: pip install -r requirements.txt

      # Step 4: Run the actual pipeline
      # All API keys are stored as GitHub Secrets (Settings → Secrets → Actions)
      # They are injected as environment variables — never appear in logs
      - name: Run pipeline
        run: python run.py
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      # Step 5: Commit the updated feed.json back to the repo
      # git diff --staged --quiet exits 0 if nothing changed, 1 if there are changes
      # The || after it means "only run git commit if diff found changes"
      # This prevents a failed commit when the pipeline ran but produced no new articles
      - name: Commit updated feed
        run: |
          git config user.name "RoboScope Bot"
          git config user.email "bot@roboscope.dev"
          git add frontend/public/feed.json runs/
          git diff --staged --quiet || git commit -m "chore: update feed $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
